<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Membase{% endblock %} — Knowledge DB</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="topnav">
        <a href="/" class="brand">Membase</a>
        <div class="nav-links">
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
            <a href="/specs" {% if '/specs' in request.path %}class="active"{% endif %}>Specs</a>
            <a href="/assertions" {% if '/assertions' in request.path %}class="active"{% endif %}>Assertions</a>
            <a href="/ops" {% if '/ops' in request.path %}class="active"{% endif %}>Procedures</a>
            <a href="/history" {% if '/history' in request.path %}class="active"{% endif %}>History</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Membase Knowledge Database &mdash; Read-only UI</p>
    </footer>
</body>
</html>
